name: sxb_mobile
description: SXB VPN - Secure VPN Mobile Application
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^5.0.0
  provider: ^6.0.0
  # VPN Support - Real VPN connectivity
  flutter_v2ray_client: ^2.0.0
  # Local notifications
  flutter_local_notifications: ^16.0.0
  # UUID for device identification
  uuid: ^4.2.1
  # Path provider for storing configs
  path_provider: ^2.1.1
  # Device info
  device_info_plus: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
