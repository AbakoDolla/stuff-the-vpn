# ══════════════════════════════════════════════════════════════════
# Nginx — Reverse Proxy — SxB VPN
# Port 80 HTTP (fonctionne avec une IP brute ou un domaine)
# Pour activer HTTPS : voir nginx/nginx-ssl.conf.example
# ══════════════════════════════════════════════════════════════════

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # ── Rate limiting ──────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  # ── Logging ────────────────────────────────────────────────────
  log_format main '$remote_addr - [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Gzip ───────────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/x-javascript;
  gzip_min_length 1000;

  # ── Upstream services (noms Docker Compose) ────────────────────
  upstream backend   { server backend:4000; }
  upstream dashboard { server dashboard:3000; }

  # ── Serveur principal HTTP :80 ────────────────────────────────
  server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # En-têtes de sécurité basiques
    add_header X-Frame-Options       DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       strict-origin-when-cross-origin;

    # ── API REST ─────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ── Auth (rate limit strict) ──────────────────────────────────
    location ~* ^/api/auth/(login|register) {
      limit_req zone=auth burst=5 nodelay;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host            $host;
      proxy_set_header   X-Real-IP       $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 15s;
    }

    # ── WebSocket / Socket.io ─────────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_read_timeout 60s;
    }

    # ── Next.js static assets ─────────────────────────────────────
    location /_next/static/ {
      proxy_pass       http://dashboard;
      proxy_set_header Host $host;
      expires          1y;
      add_header       Cache-Control "public, immutable";
    }

    # ── Dashboard Next.js (catch-all) ─────────────────────────────
    location / {
      proxy_pass         http://dashboard;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }
  }
}
