server {
    server_name vpnsxb.afrihall.com;

    root /home/ubuntu/stuff-the-vpn/apps/backend/public;

    # Serve static files from public folder (downloads, etc.)
    location /downloads/ {
        autoindex off;
        add_header Content-Disposition attachment;
    }

    # API requests go to backend
    location /api {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # All other requests go to dashboard (Vercel frontend)
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/vpnsxb.afrihall.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vpnsxb.afrihall.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = vpnsxb.afrihall.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name vpnsxb.afrihall.com;
    return 404;
}
