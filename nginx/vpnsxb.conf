# VPS Nginx Configuration for vpnsxb.afrihall.com
# This config:
#   - /api/* -> Backend API on VPS (localhost:4000)
#   - /downloads/* -> Static APK files
#   - /* -> Redirects to Vercel dashboard

server {
    server_name vpnsxb.afrihall.com;

    root /home/ubuntu/stuff-the-vpn/apps/backend/public;

    # Serve static files from public folder (downloads, etc.)
    location /downloads/ {
        autoindex off;
        add_header Content-Disposition attachment;
    }

    # API requests go to backend on VPS
    location /api {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Root redirects to Vercel dashboard
    location = / {
        return 301 https://stuff-the-vpn-dashboard.vercel.app/dashboard;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/vpnsxb.afrihall.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vpnsxb.afrihall.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = vpnsxb.afrihall.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name vpnsxb.afrihall.com;
    return 404;
}
