name: sst_vpn
description: "SxB VPN - Plateforme VPN commerciale"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.3 <4.0.0"

dependencies:
  collection: ^1.18.0
  connectivity_plus: ^5.0.2
  device_info_plus: ^10.1.0
  dio: ^5.4.0
  fl_chart: ^0.68.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.0
  flutter_hooks: ^0.20.5
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  go_router: ^14.2.0
  google_fonts: ^6.3.0
  hooks_riverpod: ^2.5.1
  intl: ^0.18.1
  path_provider: ^2.1.2
  pretty_dio_logger: ^1.3.1
  riverpod: ^2.5.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  uuid: ^4.4.0
  flutter_v2ray_client: ^2.0.0
  axevpn_flutter: ^3.0.3  # OpenVPN + WireGuard support
  cryptography: ^2.7.0    # X25519 keypair generation for WireGuard

dependency_overrides:
  app_links: 6.3.3

dev_dependencies:
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.1
  flutter_native_splash: ^2.4.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#020817"
  image: assets/images/logo.png
  color_dark: "#020817"
  image_dark: assets/images/logo.png
  android: true
  ios: true
  android_12:
    color: "#020817"
    image: assets/images/logo.png
    icon_background_color: "#020817"
