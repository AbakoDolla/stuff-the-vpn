name: Build & Download APK

on:
  push:
    branches: [ main, sxb-vpn-redesign ]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Backend URL'
        required: false
        default: 'https://api.sxbvpn.afrihall.com'

permissions:
  contents: read
  actions: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install dependencies
        run: |
          cd apps/mobile
          flutter pub get

      - name: Ensure logo asset exists
        run: |
          mkdir -p apps/mobile/assets/images
          if [ -f logo.png ]; then
            cp logo.png apps/mobile/assets/images/logo.png
          elif [ -f apps/dashboard/public/logo.png ]; then
            cp apps/dashboard/public/logo.png apps/mobile/assets/images/logo.png
          fi

      - name: Determine Backend URL
        id: backend
        run: |
          if [ -n "${{ inputs.backend_url }}" ]; then
            echo "url=${{ inputs.backend_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://api.sxbvpn.afrihall.com" >> $GITHUB_OUTPUT
          fi

      - name: Build APK (release)
        run: |
          cd apps/mobile
          flutter build apk --release \
            --dart-define=BACKEND_URL=${{ steps.backend.outputs.url }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sxbvpn-release-apk-${{ github.run_number }}
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build debug APK for testing
        run: |
          cd apps/mobile
          flutter build apk --debug \
            --dart-define=BACKEND_URL=${{ steps.backend.outputs.url }}

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sxbvpn-debug-apk-${{ github.run_number }}
          path: apps/mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
