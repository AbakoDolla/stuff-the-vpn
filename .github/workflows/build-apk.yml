name: Build & Download APK

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'mobile/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-dependency-path: mobile/pubspec.lock

      - name: Install dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Create assets directory and copy logo
        run: |
          mkdir -p mobile/assets/images
          cp apps/dashboard/public/logo.png mobile/assets/images/logo.png || echo "Logo not found"
          ls -la mobile/assets/images/

      - name: Update pubspec.yaml
        run: |
          if ! grep -q "assets:" mobile/pubspec.yaml; then
            echo '' >> mobile/pubspec.yaml
            echo '  assets:' >> mobile/pubspec.yaml
            echo '    - assets/images/' >> mobile/pubspec.yaml
          fi
          cat mobile/pubspec.yaml | grep -A5 "flutter:"

      - name: Build APK
        run: |
          cd mobile
          flutter build apk --debug 2>&1 | tee build.log
          cat build.log

      - name: Verify build output
        run: |
          ls -la mobile/build/app/outputs/flutter-apk/ || echo "Build output not found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: sxbvpn-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
