name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile_app_sxb_vpn/**'
  workflow_dispatch:         # Bouton manuel dans GitHub Actions

jobs:
  build-apk:
    name: Build & Upload APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java (required for Android build) ────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Flutter setup ─────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # ── 4. Install dependencies ──────────────────────────────────────────
      - name: Flutter pub get
        working-directory: mobile_app_sxb_vpn
        run: flutter pub get

      # ── 5. Analyze (catch errors before building) ────────────────────────
      - name: Flutter analyze
        working-directory: mobile_app_sxb_vpn
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 6. Build debug APK (fast, no signing required) ──────────────────
      - name: Build debug APK
        working-directory: mobile_app_sxb_vpn
        run: flutter build apk --debug --no-pub --no-tree-shake-icons

      # ── 7. Build release APK ─────────────────────────────────────────────
      - name: Build release APK
        working-directory: mobile_app_sxb_vpn
        run: flutter build apk --release --no-pub --split-per-abi --no-tree-shake-icons
        continue-on-error: true   # release may fail without keystore — debug APK still uploaded

      # ── 8. Upload debug APK (always available to download) ───────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: stuff-the-vpn-debug-${{ github.run_number }}
          path: mobile_app_sxb_vpn/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # ── 9. Upload release APKs (arm64 + arm32 + x86_64) ─────────────────
      - name: Upload release APKs (split-per-abi)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: stuff-the-vpn-release-${{ github.run_number }}
          path: mobile_app_sxb_vpn/build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 30

      # ── 10. Summary ──────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Taille |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          for f in mobile_app_sxb_vpn/build/app/outputs/flutter-apk/*.apk; do
            [ -f "$f" ] && echo "| $(basename $f) | $(du -sh $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done
