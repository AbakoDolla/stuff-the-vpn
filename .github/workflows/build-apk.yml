name: Build SxB VPN APK

  on:
    push:
      branches: [main]
      paths:
        - 'mobile_app_sxb_vpn/**'
    workflow_dispatch:

  jobs:
    build-apk:
      name: Build Android APK
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up Java 17
          uses: actions/setup-java@v4
          with:
            distribution: 'temurin'
            java-version: '17'

        - name: Set up Flutter
          uses: subosito/flutter-action@v2
          with:
            flutter-version: '3.24.5'
            channel: 'stable'
            cache: true

        - name: Get Flutter dependencies
          working-directory: mobile_app_sxb_vpn
          run: flutter pub get

        - name: Analyze Flutter project
          working-directory: mobile_app_sxb_vpn
          run: flutter analyze --no-fatal-infos || true

        - name: Build release APK
          working-directory: mobile_app_sxb_vpn
          run: flutter build apk --release --no-tree-shake-icons

        - name: Upload APK artifact
          uses: actions/upload-artifact@v4
          with:
            name: sxb-vpn-release-apk
            path: mobile_app_sxb_vpn/build/app/outputs/flutter-apk/app-release.apk
            retention-days: 30

        - name: Build APK bundle (AAB) for Play Store
          working-directory: mobile_app_sxb_vpn
          run: flutter build appbundle --release --no-tree-shake-icons

        - name: Upload AAB artifact
          uses: actions/upload-artifact@v4
          with:
            name: sxb-vpn-release-aab
            path: mobile_app_sxb_vpn/build/app/outputs/bundle/release/app-release.aab
            retention-days: 30
  