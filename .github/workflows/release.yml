name: Release APK

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'URL de l API backend (ex: http://185.237.15.214:4000/api)'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
          cache: true

      - name: Generate debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore $HOME/.android/debug.keystore \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "SHA1:"
          keytool -list -v -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey -storepass android -keypass android | grep SHA1

      - name: Flutter pub get
        working-directory: apps/mobile
        run: flutter pub get

      - name: Flutter analyze
        working-directory: apps/mobile
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK (release)
        working-directory: apps/mobile
        run: |
          BACKEND="${{ github.event.inputs.backend_url || vars.BACKEND_URL || 'https://api.sxbvpn.com/api' }}"
          echo "Backend URL: $BACKEND"
          flutter build apk --release --no-tree-shake-icons \
            --dart-define=BACKEND_URL="$BACKEND"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sxb-vpn-release-apk-${{ github.run_number }}
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build Summary
        if: always()
        run: |
          echo "## APK Build Summary" >> $GITHUB_STEP_SUMMARY
          APK="apps/mobile/build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK" ]; then
            echo "| Fichier | Taille |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| app-release.apk | $(du -sh $APK | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          fi
