name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile_app_sxb_vpn/**"

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
          cache: true

      - name: Create base Flutter project
        run: |
          flutter create --org com.sxbvpn --project-name sxb_vpn --platforms android /tmp/sxb_app
          echo "✅ Base project created"

      - name: Inject our lib/ code
        run: |
          rm -rf /tmp/sxb_app/lib
          cp -r mobile_app_sxb_vpn/lib /tmp/sxb_app/lib
          echo "✅ lib injected"

      - name: Inject pubspec.yaml
        run: |
          cp mobile_app_sxb_vpn/pubspec.yaml /tmp/sxb_app/pubspec.yaml
          echo "✅ pubspec injected"

      - name: Get dependencies
        working-directory: /tmp/sxb_app
        run: flutter pub get

      # 🔥 FIX COMPLET SHA1 ERROR (TON PROBLÈME)
      - name: Generate debug keystore + print SHA1
        run: |
          mkdir -p $HOME/.android

          keytool -genkeypair \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore $HOME/.android/debug.keystore \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

          echo "================ SHA1 & SHA256 ================="

          keytool -list -v \
            -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android

      - name: Build APK (release)
        working-directory: /tmp/sxb_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sxb-vpn-release-apk
          path: /tmp/sxb_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
