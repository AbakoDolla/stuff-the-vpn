name: Build SXB VPN Mobile App

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Backend API URL'
        required: false
        default: 'https://vpnsxb.afrihall.com/api'
  push:
    branches: [main]
    paths:
      - "mobile/**"

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze Flutter project
        working-directory: mobile
        run: flutter analyze --no-fatal-infos || true

      - name: Build release APK (Secured)
        working-directory: mobile
        env:
          BACKEND_URL: ${{ github.event.inputs.backend_url || vars.BACKEND_URL || 'https://vpnsxb.afrihall.com/api' }}
        run: |
          echo "Building SXB VPN APK with BACKEND_URL=$BACKEND_URL"
          # Obfuscate the build for security
          flutter build apk --release \
            --dart-define=BACKEND_URL="$BACKEND_URL" \
            --obfuscate \
            --split-debug-info=build/debug-info
        continue-on-error: true

      - name: Build release APK (Standard)
        working-directory: mobile
        env:
          BACKEND_URL: ${{ github.event.inputs.backend_url || vars.BACKEND_URL || 'https://vpnsxb.afrihall.com/api' }}
        run: |
          echo "Building SXB VPN APK with BACKEND_URL=$BACKEND_URL"
          flutter build apk --release --no-tree-shake-icons \
            --dart-define=BACKEND_URL="$BACKEND_URL"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sxb-vpn-release-apk-${{ github.run_number }}
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Build AAB (Play Store)
        working-directory: mobile
        env:
          BACKEND_URL: ${{ github.event.inputs.backend_url || vars.BACKEND_URL || 'https://vpnsxb.afrihall.com/api' }}
        run: |
          flutter build appbundle --release --no-tree-shake-icons \
            --dart-define=BACKEND_URL="$BACKEND_URL"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sxb-vpn-release-aab-${{ github.run_number }}
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7
