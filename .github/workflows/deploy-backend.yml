name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'docker-compose.yml'
      - '.env.example'

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Skipped if VPS secrets are not configured
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ~/stuff-the-vpn
            git pull
            cd apps/backend
            npm install
            npx prisma migrate deploy
            pm2 restart sxbvpn-backend || pm2 start dist/index.mjs --name sxbvpn-backend
