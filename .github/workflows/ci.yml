# CI Pipeline — Stuff The VPN
  name: CI

  on:
    push:
      branches: [main, develop]
    pull_request:
      branches: [main, develop]

  jobs:
    backend-typecheck:
      name: Backend — Build & TypeCheck
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: apps/backend
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: '20'
        - name: Install backend deps (standalone)
          run: npm install
        - name: Generate Prisma client
          run: npx prisma generate
        - name: TypeCheck
          run: npx tsc --noEmit

    dashboard-build:
      name: Dashboard — Build Check
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: apps/dashboard
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: '20'
        - name: Install dashboard deps
          run: npm install
        - name: Build Next.js
          run: npm run build
          env:
            NEXT_TELEMETRY_DISABLED: 1
            NEXT_PUBLIC_API_URL: http://localhost:5000

    flutter-build:
      name: Flutter — Build APK
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: '17'
        - uses: subosito/flutter-action@v2
          with:
            flutter-version: '3.22.2'
            channel: stable
            cache: true
        - name: Flutter pub get
          working-directory: mobile_app_sxb_vpn
          run: flutter pub get
        - name: Flutter analyze
          working-directory: mobile_app_sxb_vpn
          run: flutter analyze --no-fatal-infos || true
        - name: Build APK
          working-directory: mobile_app_sxb_vpn
          run: flutter build apk --release --no-tree-shake-icons
        - uses: actions/upload-artifact@v4
          with:
            name: sxb-vpn-apk
            path: mobile_app_sxb_vpn/build/app/outputs/flutter-apk/app-release.apk

    docker-build:
      name: Docker — Build Images
      runs-on: ubuntu-latest
      needs: [backend-typecheck, dashboard-build]
      steps:
        - uses: actions/checkout@v4
        - name: Build backend image
          run: docker build -f docker/backend.Dockerfile .
        - name: Build dashboard image
          run: docker build -f docker/dashboard.Dockerfile apps/dashboard
  