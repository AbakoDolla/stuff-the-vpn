# CI Pipeline — Stuff The VPN
  name: CI

  on:
    push:
      branches: [main, develop]
    pull_request:
      branches: [main, develop]

  jobs:
    install:
      name: Install dependencies
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: pnpm/action-setup@v4
          with:
            version: 9
        - uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'pnpm'
        - run: pnpm install --frozen-lockfile

    backend-typecheck:
      name: Backend — TypeCheck
      runs-on: ubuntu-latest
      needs: install
      steps:
        - uses: actions/checkout@v4
        - uses: pnpm/action-setup@v4
          with:
            version: 9
        - uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'pnpm'
        - run: pnpm install --frozen-lockfile
        - run: pnpm run typecheck:libs
        - run: pnpm --filter @workspace/api-server run typecheck

    dashboard-build:
      name: Dashboard — Build Check
      runs-on: ubuntu-latest
      needs: install
      steps:
        - uses: actions/checkout@v4
        - uses: pnpm/action-setup@v4
          with:
            version: 9
        - uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'pnpm'
        - run: pnpm install --frozen-lockfile
        - run: pnpm --filter @stuff-the-vpn/dashboard run build
          env:
            NEXT_TELEMETRY_DISABLED: 1
            NEXTAUTH_SECRET: ci-secret-placeholder
            NEXTAUTH_URL: http://localhost:3000
            NEXT_PUBLIC_API_URL: http://localhost:5000

    docker-build:
      name: Docker — Build Images
      runs-on: ubuntu-latest
      needs: [backend-typecheck, dashboard-build]
      steps:
        - uses: actions/checkout@v4
        - name: Build backend image
          run: docker build -f docker/backend.Dockerfile .
        - name: Build dashboard image
          run: docker build -f docker/dashboard.Dockerfile -t stuff-the-vpn-dashboard apps/dashboard
  