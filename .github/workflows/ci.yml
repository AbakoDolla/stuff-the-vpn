# CI Pipeline — Stuff The VPN
# Déclenché sur chaque push et pull request vers main et develop.
#
# TODO (Phase 7): Ajouter les étapes de déploiement automatique.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint-typecheck:
    name: Backend — Lint & TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/api-server build
      - run: pnpm --filter @workspace/api-server typecheck

  dashboard-lint-typecheck:
    name: Dashboard — Lint & TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @stuff-the-vpn/dashboard build

  mobile-test:
    name: Mobile — Flutter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
      - name: Get Flutter dependencies
        working-directory: mobile_app_sxb_vpn
        run: flutter pub get
      - name: Analyze Flutter project
        working-directory: mobile_app_sxb_vpn
        run: flutter analyze
      - name: Run Flutter tests
        working-directory: mobile_app_sxb_vpn
        run: flutter test

  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-lint-typecheck, dashboard-lint-typecheck]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile apps/backend
      - name: Build dashboard image
        run: docker build -f docker/dashboard.Dockerfile apps/dashboard
