# CI Pipeline — Stuff The VPN (pnpm monorepo)
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint-typecheck:
    name: Backend — Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Build workspace libs (@workspace/db, @workspace/api-zod)
        run: pnpm --filter "@workspace/*" build
      - name: Generate Prisma client
        run: pnpm --filter @workspace/api-server exec prisma generate
      - name: Build backend
        run: pnpm --filter @workspace/api-server build
      - name: TypeCheck backend
        run: pnpm --filter @workspace/api-server typecheck

  dashboard-lint-typecheck:
    name: Dashboard — Lint & TypeCheck
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Build dashboard
        run: pnpm --filter @stuff-the-vpn/dashboard build

  mobile-test:
    name: Mobile — Flutter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true
      - name: Get Flutter dependencies
        working-directory: mobile_app_sxb_vpn
        run: flutter pub get
      - name: Analyze Flutter project
        working-directory: mobile_app_sxb_vpn
        run: flutter analyze --no-fatal-infos
      - name: Run Flutter tests
        working-directory: mobile_app_sxb_vpn
        run: flutter test
