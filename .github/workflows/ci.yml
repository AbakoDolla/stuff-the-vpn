name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-typecheck:
    name: CI / Backend — TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db
      JWT_SECRET: ci_jwt_secret_at_least_32_chars_here!!
      ENCRYPTION_KEY: ci_encryption_key_32_chars_here!!
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json
      - name: Install backend deps
        run: npm install
      - name: Generate Prisma client
        run: npx prisma generate
      - name: TypeCheck
        run: npx tsc --noEmit

  dashboard-build:
    name: CI / Dashboard — Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Install dashboard deps
        run: npm install --legacy-peer-deps
      - name: Build Next.js
        run: npm run build

  flutter-build:
    name: CI / Flutter — Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true
      - name: Flutter pub get (sxb_vpn)
        working-directory: mobile_app_sxb_vpn
        run: flutter pub get
      - name: Flutter analyze
        working-directory: mobile_app_sxb_vpn
        run: flutter analyze --no-fatal-infos || true
      - name: Build APK
        working-directory: mobile_app_sxb_vpn
        run: flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: sxb-vpn-apk-ci
          path: mobile_app_sxb_vpn/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
