name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-typecheck:
    name: Backend — TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install backend deps
        run: npm install
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db
      - name: TypeCheck
        run: npx tsc --noEmit

  dashboard-build:
    name: Dashboard — Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dashboard deps
        run: npm install --legacy-peer-deps
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:5000' }}

  flutter-build:
    name: Flutter — Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true
      - name: Flutter pub get
        working-directory: mobile_app_sxb_vpn
        run: flutter pub get
      - name: Flutter analyze
        working-directory: mobile_app_sxb_vpn
        run: flutter analyze --no-fatal-infos || true
      - name: Build APK
        working-directory: mobile_app_sxb_vpn
        run: flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: sxb-vpn-apk-ci
          path: mobile_app_sxb_vpn/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
