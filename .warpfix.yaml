review:
  profile: assertive
  auto_review: true

  path_instructions:
    - glob: "src/auth/**"
      instruction: "Check authentication security, JWT handling, password hashing and vulnerabilities"

    - glob: "src/api/**"
      instruction: "Check API security, validation and authorization"

    - glob: "src/**/*.ts"
      instruction: "Review TypeScript quality and potential bugs"

  ignore_paths:
    - "node_modules/**"
    - "dist/**"
    - "build/**"

repair:
  auto_fix: true
  min_confidence: 70

  skip_branches:
    - "main"
    - "production"

analysis:
  dead_code: true
  security_scan: true
  predictive_ci: true

quality_gates:
  - name: "No debug logs"
    rule: "No console.log in production code"

  - name: "No secrets"
    rule: "Detect exposed API keys and passwords"

chat:
  enabled: true
